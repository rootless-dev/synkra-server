# SonarQube Configuration
# Project metadata
sonar.projectKey=synkra-server

# Source code location
sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/.github/**,**/mocks/**

# Tests location
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Coverage
sonar.coverage.reportPaths=coverage.out
sonar.go.coverage.reportPaths=coverage.out

# Exclusions for coverage
sonar.coverage.exclusions=**/*_test.go,**/vendor/**,**/mocks/**

# Go specific settings
sonar.sourceEncoding=UTF-8

# Language
sonar.language=go

# Ignore backup files
sonar.scm.exclusions.disabled=true

# Build breaker - fail pipeline on quality gate failure
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300